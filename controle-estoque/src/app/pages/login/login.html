<div class="login-container">
  <h2>Login</h2>
  <form [formGroup]="loginForm" (ngSubmit)="login()">
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>E-mail</mat-label>
      <input matInput type="email" id="email" formControlName="email" placeholder="Digite seu e-mail" />
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Senha</mat-label>
      <input matInput type="password" id="password" formControlName="password" placeholder="Digite sua senha" />
    </mat-form-field>

    @if (errorMessage) {
      <p class="error-message">{{ errorMessage }}</p>
    }
    
    <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid">Entrar</button>
  </form>
</div>
