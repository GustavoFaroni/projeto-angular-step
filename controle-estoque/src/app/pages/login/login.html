<div class="login-wrapper">
  <mat-card class="login-card">
    <div class="login-header">
      <h2>Bem-vindo</h2>
      <p>Acesse sua conta para continuar</p>
    </div>

    <mat-card-content>
      @if (errorMessage) {
        <div class="error-message">
          {{ errorMessage }}
        </div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="login()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" id="email" formControlName="email" placeholder="exemplo@email.com" />
          <mat-icon matPrefix style="margin-right: 8px; vertical-align: middle; color: #666;">email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input matInput type="password" id="password" formControlName="password" />
          <mat-icon matPrefix style="margin-right: 8px; vertical-align: middle; color: #666;">lock</mat-icon>
        </mat-form-field>

        <button mat-flat-button color="primary" class="login-button" type="submit" [disabled]="loginForm.invalid">
          ENTRAR
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
