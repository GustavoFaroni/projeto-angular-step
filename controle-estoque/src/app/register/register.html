<div class="register-container">
  <h2>Registro</h2>

  <div *ngIf="message" class="success">{{ message }}</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <input type="text" [(ngModel)]="nome" placeholder="Nome" />
  <input type="email" [(ngModel)]="email" placeholder="Email" />
  <select [(ngModel)]="cargo">
    <option value="">Selecione um cargo</option>
    <option value="operacional">Operacional</option>
    <option value="gerente">Gerente</option>
    <option value="administrador">Administrador</option>
  </select>
  <input type="password" [(ngModel)]="password" placeholder="Senha" />

  <button (click)="register()" [disabled]="isSubmitting">
    {{ isSubmitting ? 'Registrando...' : 'Registrar' }}
  </button>

  <p class="link-row">
    <a routerLink="/login">Entrar</a>
  </p>
</div>
