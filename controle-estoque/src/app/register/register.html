<div class="register-wrapper">
  @if (message) {
    <div class="message-banner success-message">
      <mat-icon>check_circle</mat-icon>
      {{ message }}
    </div>
  }
  
  @if (error) {
    <div class="message-banner error-message">
      <mat-icon>error</mat-icon>
      {{ error }}
    </div>
  }

  <form [formGroup]="registerForm" (ngSubmit)="register()">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nome Completo</mat-label>
      <input matInput type="text" formControlName="nome" placeholder="Ex: João Silva" />
      <mat-icon matPrefix style="margin-right: 8px; color: #666;">person</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>E-mail</mat-label>
      <input matInput type="email" formControlName="email" placeholder="exemplo@email.com" />
      <mat-icon matPrefix style="margin-right: 8px; color: #666;">email</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Cargo</mat-label>
      <mat-select formControlName="cargo">
        <mat-option value="operacional">Operacional</mat-option>
        <mat-option value="gerente">Gerente</mat-option>
        <mat-option value="administrador">Administrador</mat-option>
      </mat-select>
      <mat-icon matPrefix style="margin-right: 8px; color: #666;">badge</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Senha</mat-label>
      <input matInput type="password" formControlName="password" />
      <mat-icon matPrefix style="margin-right: 8px; color: #666;">lock</mat-icon>
    </mat-form-field>

    <button mat-flat-button color="primary" class="register-button" type="submit" [disabled]="isSubmitting || registerForm.invalid">
      <mat-icon style="margin-right: 8px;">person_add</mat-icon>
      {{ isSubmitting ? 'CADASTRANDO...' : 'CADASTRAR USUÁRIO' }}
    </button>
  </form>
</div>
